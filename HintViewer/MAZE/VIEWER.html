<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRACE LOG VIEWER</title>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<style>
/* =========================
   全体
========================= */
body{
  margin:0;
  font-family:"Consolas","Segoe UI","Meiryo",sans-serif;
  background:#0c1424;
  color:#d7f7ff;
}

/* =========================
   ヘッダー
========================= */
header{
  padding:14px;
  background:#111c2e;
  border-bottom:1px solid #2a3a55;
}

/* =========================
   案内
========================= */
#guide{
  padding:10px 14px;
  font-size:12px;
  color:#9ffcff;
  border-bottom:1px solid #2a3a55;
  line-height:1.6;
}

/* =========================
   現在地
========================= */
#current{
  padding:10px 14px;
  font-weight:bold;
}

/* =========================
   マップ
========================= */
#mermaid{
  margin:10px;
  height:70vh;
  overflow:auto;
  background:#101a2a;
  border:1px solid #2a3a55;
}

/* =========================
   ノード
========================= */
.node rect{
  fill:#22334a !important;
  stroke:#6fb6ff !important;
  stroke-width:2px !important;
}

/* 現在地（赤）
========================= */
.node.current rect{
  fill:#5a1f1f !important;
  stroke:#ff3b3b !important;
  stroke-width:3px !important;
}

/* =========================
   ノード文字
========================= */
.nodeLabel,
.node .label{
  fill:#ffffff !important;
  color:#ffffff !important;

  font-size:15px !important;
  font-weight:800 !important;

  stroke:#1b2a40 !important;
  stroke-width:2px !important;

  paint-order:stroke;
}

/* =========================
   線（リンク）
========================= */
.edgePath path{
  stroke:#4da6ff !important;
  stroke-width:4px !important;

  filter:
    drop-shadow(0 0 3px #4da6ff)
    drop-shadow(0 0 8px #4da6ff);

  opacity:1;
}

/* =========================
   矢印
========================= */
marker path{
  fill:#4da6ff !important;
  stroke:#4da6ff !important;
}

.edgePath markerPath{
  fill:#4da6ff !important;
  stroke:#4da6ff !important;
}

/* =========================
   スクロールバー
========================= */
#mermaid::-webkit-scrollbar{
  width:8px;
}

#mermaid::-webkit-scrollbar-thumb{
  background:#6fb6ff55;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>TRACE LOG VIEWER</h2>
</header>

<div id="guide">
▶ ノードクリックで別ウィンドウへ遷移<br>
▶ 通過済みノードのみ表示（未訪問は非表示）<br>
▶ ログはローカルストレージ同期
</div>

<div id="current"></div>
<div id="mermaid"></div>

<script>

mermaid.initialize({
  startOnLoad:false,
  securityLevel:"loose",
  flowchart:{
    curve:"linear"
  }
})

let pages={}
const box=document.getElementById("mermaid")

// =====================
// 別ウィンドウでノード開く
// =====================
function openNode(id){

  const url = pages[id]?.url || ("node_"+id+".html")

  const w=window.open("", "mazeNode")

  if(w && !w.closed){
    w.location.href=url
    w.focus()
  }else{
    window.open(url,"mazeNode")
  }
}

// =====================
// 描画
// =====================
function render(){

  const state=JSON.parse(localStorage.getItem("mazeState")||"null")

  if(!state){
    box.innerHTML="NO DATA"
    return
  }

  document.getElementById("current").innerText=
    "CURRENT : "+state.current

  const visited=new Set(state.visited||[])

  let g="flowchart TB\n"
  let edgeIndex=0

  // =====================
  // ノード生成
  // =====================
  visited.forEach(id=>{
    const p=pages[id]
    if(!p) return

    g+=`${id}["${id}<br>${p.title}"]\n`

    if(id==state.current){
      g+=`style ${id} fill:#5a1f1f,stroke:#ff3b3b\n`
      g+=`class ${id} current\n`
    }else{
      g+=`style ${id} fill:#22334a,stroke:#6fb6ff\n`
    }
  })

  // =====================
  // エッジ + linkStyle
  // =====================
  visited.forEach(id=>{
    const p=pages[id]
    if(!p) return

    p.next.forEach(n=>{
      if(visited.has(String(n))){

        g+=`${id}-->${n}\n`

        g+=`linkStyle ${edgeIndex} stroke:#4da6ff,stroke-width:4px\n`

        edgeIndex++
      }
    })
  })

  mermaid.render("g_"+Date.now(),g).then(res=>{
    box.innerHTML=res.svg

    box.addEventListener("click",(e)=>{
      const target=e.target.closest("[data-id]")
      if(!target) return
      openNode(target.getAttribute("data-id"))
    })
  })
}

// =====================
// 初期化
// =====================
fetch("nodes.json")
.then(r=>r.json())
.then(d=>{
  pages=d
  render()
  window.addEventListener("storage",render)
})

</script>

</body>
</html>
